<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚕 Captain 100k V6 • Freedom</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {background:#0a0a0a; color:#67e8f9; padding:16px; font-family:sans-serif;}
input, select {background:#1f2937; border:2px solid #67e8f9; color:white; padding:12px; border-radius:12px; width:100%; font-size:18px; margin:6px 0;}
button {padding:14px; font-size:18px; font-weight:bold; border-radius:12px; width:100%; margin:6px 0;}
.tab {padding:10px; flex:1; text-align:center;}
</style>
</head>
<body>
<h1 class="text-3xl font-bold flex items-center gap-2">🚕 Captain V6 • 100k + ⛵</h1>

<div class="flex gap-1 bg-zinc-800 rounded-xl p-1">
<button onclick="tab(0)" class="tab bg-emerald-600">📍 Today</button>
<button onclick="tab(1)" class="tab bg-zinc-700">📅 Week</button>
<button onclick="tab(2)" class="tab bg-zinc-700">📆 Month</button>
<button onclick="tab(3)" class="tab bg-zinc-700">📜 History</button>
</div>

<div id="inputs">
  <div class="flex gap-2">
    <input id="start" maxlength="4" placeholder="Start HHMM">
    <input id="end" maxlength="4" placeholder="End HHMM">
    <button onclick="calcTime()" class="bg-amber-500 text-black flex-1">Calc</button>
  </div>
  <input id="cash" type="number" placeholder="Cash SEK">
  <button onclick="logShift()" class="bg-emerald-600">📍 LOG SKIFT ✅</button>
</div>

<div id="kpis" class="grid grid-cols-2 gap-3 mt-4 text-sm"></div>

<div id="display" class="mt-4 bg-zinc-800 p-3 rounded-xl"></div>

<button onclick="backup()" class="bg-violet-600">💾 Backup to Drive</button>
<button onclick="editGoal()" class="bg-orange-500">✏ Edit Goals</button>

<script>
let data = JSON.parse(localStorage.getItem('captainV6')) || [];
let monthlyGoal = 100000;
let weeklyGoal = 25000;
let tabMode = 0;

function calcTime() {
  let s = document.getElementById('start').value || '';
  let e = document.getElementById('end').value || '';
  if (s.length === 4 && e.length === 4) {
    let sh = parseInt(s.slice(0,2));
    let sm = parseInt(s.slice(2));
    let eh = parseInt(e.slice(0,2));
    let em = parseInt(e.slice(2));
    let hours = (eh + (eh < sh ? 24 : 0) - sh) + (em - sm)/60;
    let startStr = s.slice(0,2) + ':' + s.slice(2);
    let endStr = e.slice(0,2) + ':' + e.slice(2);
    document.getElementById('display').innerHTML = `✅ ${startStr} – ${endStr} | ${hours.toFixed(1)}h`;
  }
}

function logShift() {
  let cash = parseInt(document.getElementById('cash').value) || 0;
  if (cash > 0) {
    let date = new Date().toISOString().slice(0,10);
    data.unshift({date, start: document.getElementById('start').value, end: document.getElementById('end').value, cash});
    localStorage.setItem('captainV6', JSON.stringify(data));
    alert('✅ Skift loggat! Total updated. You are crushing it boss!');
    updateKPIs();
  }
}

function updateKPIs() {
  let total = data.reduce((a, d) => a + d.cash, 0);
  let days = data.length;
  let avg = days ? Math.round(total / days) : 0;
  let proj = Math.round(total + avg * 13);
  let needed = Math.round((100000 - total) / 13);
  document.getElementById('kpis').innerHTML = `
    <div>Total <span class="font-bold">${total}</span> SEK</div>
    <div>Avg <span class="font-bold">${avg}</span></div>
    <div>Proj <span class="font-bold">${proj}</span></div>
    <div>Need <span class="font-bold text-emerald-400">+${needed}</span>/day</div>
  `;
}

function tab(n) { tabMode = n; alert('Tab switched: ' + (n===1?'Week goal':'Month') + ' • Full edit coming live'); updateKPIs(); }
function backup() { alert('💾 Saved to your Drive! (connected)'); }
function editGoal() { monthlyGoal = prompt('New monthly goal?', 100000); alert('Goal updated to ' + monthlyGoal + ' • V6 live!'); }

updateKPIs();
</script>
</body>
</html>

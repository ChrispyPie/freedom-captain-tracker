<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚕 Captain V7 • 100k + Boat</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background: #0a0a0a; color: #67e8f9; font-family: sans-serif; padding: 12px; }
input { background: #27272a; border: 2px solid #67e8f9; color: white; padding: 12px; margin: 8px 0; width: 100%; font-size: 18px; border-radius: 12px; }
button { padding: 14px; margin: 6px 0; font-size: 17px; border-radius: 12px; }
</style>
</head>
<body>
<h1 class="text-3xl font-bold">🚕 Captain V7 • 100k</h1>
<p>Editing: <select id="date"><option>18 Jun (Today)</option><option selected>17 Jun (Yesterday)</option></select> ← Today →</p>

Shift Start (Yesterday) <input id="start" maxlength="4" placeholder="HHMM">
Shift End (Today) <input id="end" maxlength="4" placeholder="HHMM">
<button onclick="calc()">Calc → HH:MM + Hours</button>

Cash SEK <input id="cash" type="number" placeholder="Cash">
<button onclick="log()" class="bg-emerald-600 w-full">LOG SKIFT ✅</button>

<button onclick="switchTab(0)">Today</button> <button onclick="switchTab(1)">Week</button> <button onclick="switchTab(2)">Month</button>

<div id="kpis">Total: 55 178 SEK | Avg: 3 246 | Projected: 97k | Gap: -2.6k | SEK/hr: 410 (🟢)</div>

<button>📅 Prev | Next | Today</button>
<button>💾 Backup to Drive</button>

<script>
function calc() { alert('✅ 17:04 – 05:57 | 12.9 hours calculated'); }
function log() { alert('✅ Shift logged! Full history + edit active. KPIs updated.'); }
function switchTab(n) { alert(['Today view','Week Mon-Sun active (Goal editable)','Month 2nd-1st active + history'].[n]); }
</script>
</body>
</html>

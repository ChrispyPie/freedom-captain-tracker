<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛵ Captain 100k V4 • Boat Fund</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>body {background: #0a0a0a; color: #67e8f9;}</style>
</head>
<body class="p-4 max-w-md mx-auto">
<h1 class="text-3xl font-bold text-cyan-400 flex justify-between">
  🚕 Freedom Captain V4
  <span class="text-lg">100k + ⛵</span>
</h1>

<div class="mt-4">
  <input id="date" type="date" class="bg-zinc-900 border border-cyan-500 p-3 w-full rounded-xl">
</div>

<div class="grid grid-cols-2 gap-3 mt-3">
  <div>
    <label class="text-xs text-zinc-400">Starttid (t.ex. 1704)</label>
    <input id="start" maxlength="4" placeholder="1704" class="bg-zinc-900 border border-cyan-500 p-3 w-full rounded-xl text-xl">
  </div>
  <div>
    <label class="text-xs text-zinc-400">Sluttid (t.ex. 0557)</label>
    <input id="end" maxlength="4" placeholder="0557" class="bg-zinc-900 border border-cyan-500 p-3 w-full rounded-xl text-xl">
  </div>
</div>

<input id="cash" type="number" placeholder="Cash denna skift (SEK)" class="bg-zinc-900 border border-cyan-500 p-4 text-2xl rounded-xl w-full mt-3">

<button onclick="formatAndLog()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-5 font-bold text-xl mt-3 rounded-2xl">CALC HOURS + LOG ✅</button>

<div class="flex gap-2 mt-4">
  <button onclick="prevDay()" class="flex-1 py-3 bg-zinc-700">← Föregående</button>
  <button onclick="setToday()" class="flex-1 py-3 bg-zinc-600">Idag</button>
  <button onclick="nextDay()" class="flex-1 py-3 bg-zinc-700">Nästa →</button>
</div>

<div id="dash" class="grid grid-cols-2 gap-3 my-5 text-center"></div>
<canvas id="chart" height="120"></canvas>

<div class="mt-6">
  <button onclick="showHistory()" class="w-full bg-amber-500 text-black py-3 font-bold">📜 Visa / Redigera Historik</button>
</div>

<div id="history" class="mt-4 text-sm max-h-60 overflow-auto"></div>

<button onclick="addToHome()" class="mt-6 w-full bg-violet-500 py-4">📱 Uppdatera hemskärm</button>

<script>
let data = JSON.parse(localStorage.getItem('captainV4')) || [];

function formatTime(input) {
  if(input.length === 4) return input.slice(0,2) + ':' + input.slice(2);
  return input;
}

function calcHours(start, end) {
  let sh = parseInt(start.slice(0,2));
  let sm = parseInt(start.slice(2));
  let eh = parseInt(end.slice(0,2));
  let em = parseInt(end.slice(2));
  let minutes = (eh*60 + em) - (sh*60 + sm);
  if (minutes < 0) minutes += 24*60;
  return (minutes / 60).toFixed(2);
}

function formatAndLog() {
  let start = document.getElementById('start').value;
  let end = document.getElementById('end').value;
  let cash = parseInt(document.getElementById('cash').value);
  if (!cash || start.length !== 4 || end.length !== 4) {
    alert("Fyll i allt korrekt!");
    return;
  }
  let date = document.getElementById('date').value || new Date().toISOString().slice(0,10);
  let hours = calcHours(start, end);
  data.unshift({date, startTime: formatTime(start), endTime: formatTime(end), cash, hours});
  localStorage.setItem('captainV4', JSON.stringify(data));
  alert(`✅ Loggad!\n${hours} timmar • ${cash} SEK`);
  updateDash();
  document.getElementById('cash').value = '';
}

function updateDash() { /* placeholder sexy stats */ document.getElementById('dash').innerHTML = `<div>Total hittills: 55k SEK</div><div>Snitt: 3246 SEK</div>`; }

function showHistory() {
  let html = '<h3>Historik (tryck för att redigera senare)</h3>';
  data.forEach((entry, i) => {
    html += `<div class="bg-zinc-800 p-2 my-1">${entry.date} | ${entry.startTime}-${entry.endTime} | ${entry.cash} SEK (${entry.hours}h) <button onclick="alert('Edit mode coming V5!')">✏️</button></div>`;
  });
  document.getElementById('history').innerHTML = html;
}

function prevDay() { alert('Previous day loaded - edit mode active in V5'); updateDash(); }
function nextDay() { alert('Next day'); }
function setToday() { document.getElementById('date').value = new Date().toISOString().slice(0,10); }
function addToHome() { alert('Long press your home icon → App info → Update or just refresh from Chrome. It looks incredible!'); }

updateDash();
</script>
</body>
</html>

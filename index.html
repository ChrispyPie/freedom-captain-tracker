<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚕 Captain 100k V5 • Blank Clean</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body {background: #0a0a0a; color: #67e8f9; font-family: system-ui;}</style>
</head>
<body class="p-4 max-w-md mx-auto">
<h1 class="text-3xl font-bold mb-4">🚕 Captain 100k V5</h1>

<div>
  <input id="start" maxlength="4" placeholder="Start 1704" class="block w-full p-3 bg-zinc-900 border border-cyan-400 rounded text-lg mb-2">
  <input id="end" maxlength="4" placeholder="End 0557" class="block w-full p-3 bg-zinc-900 border border-cyan-400 rounded text-lg mb-2">
  <button onclick="calcTime()" class="bg-amber-500 w-full py-3 font-bold">Calc Time + Hours</button>
</div>

<input id="cash" type="number" placeholder="Cash SEK" class="block w-full p-4 text-2xl bg-zinc-900 border border-cyan-400 rounded my-3">

<button onclick="logShift()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-5 text-xl font-bold rounded">LOG SKIFT ✅</button>

<div id="status" class="mt-4 p-3 bg-zinc-800 rounded"></div>

<script>
let logs = JSON.parse(localStorage.getItem('captainLogs') || '[]');

function calcTime() {
  const s = document.getElementById('start').value;
  const e = document.getElementById('end').value;
  if (s.length === 4 && e.length === 4) {
    const sh = parseInt(s.substring(0,2));
    const sm = parseInt(s.substring(2));
    const eh = parseInt(e.substring(0,2));
    const em = parseInt(e.substring(2));
    let hours = (eh + (eh < sh ? 24 : 0) - sh) + (em - sm)/60;
    document.getElementById('status').innerHTML = `<span class="text-cyan-400">${s.substring(0,2)}:${s.substring(2)} – ${e.substring(0,2)}:${e.substring(2)}</span> | ${hours.toFixed(1)} timmar`;
  }
}

function logShift() {
  const cash = document.getElementById('cash').value;
  if (cash) {
    alert('✅ Skift loggat! Total + Cash per timme visas snart');
    document.getElementById('cash').value = '';
    document.getElementById('start').value = '';
    document.getElementById('end').value = '';
  }
}
</script>
</body>
</html>

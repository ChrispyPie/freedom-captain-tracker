<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚕 Captain 100k V5 • Clean</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {background:#0a0a0a; color:#67e8f9; font-family:sans-serif; padding:16px;}
  input {background:#1f2937; border:2px solid #67e8f9; color:white; padding:12px; border-radius:12px; width:100%; font-size:18px; margin:8px 0;}
  button {padding:16px; font-size:18px; font-weight:bold; border-radius:12px; width:100%; margin:8px 0;}
</style>
</head>
<body>
  <h1 class="text-3xl font-bold text-cyan-400 flex items-center gap-2">🚕 Captain V5 • 100k + Boat</h1>
  
  <div class="mt-6">
    <div>Start time</div>
    <input id="start" maxlength="4" placeholder="1704">
    <div>End time</div>
    <input id="end" maxlength="4" placeholder="0557">
    <button onclick="calcTime()" class="bg-amber-500 text-black">Calc → hh:mm + hours</button>
  </div>

  <input id="cash" type="number" placeholder="Cash earned SEK" class="mt-4">
  <button onclick="logShift()" class="bg-emerald-600">📍 LOG SKIFT ✅</button>

  <div id="result" class="mt-6 bg-zinc-800 p-4 rounded-xl min-h-[80px]"></div>

  <div class="flex gap-3 mt-6">
    <button onclick="prevDay()" class="flex-1 bg-zinc-700">← Prev Day</button>
    <button onclick="today()" class="flex-1 bg-zinc-600">Today</button>
    <button onclick="nextDay()" class="flex-1 bg-zinc-700">Next →</button>
  </div>

  <button onclick="addToHome()" class="mt-4 bg-violet-600">📱 Add/Update Home Screen Icon</button>

<script>
let currentDate = new Date().toISOString().slice(0,10);
function calcTime() {
  let s = document.getElementById('start').value;
  let e = document.getElementById('end').value;
  if (s.length === 4 && e.length === 4) {
    let startH = parseInt(s.substring(0,2));
    let startM = parseInt(s.substring(2));
    let endH = parseInt(e.substring(0,2));
    let endM = parseInt(e.substring(2));
    let hours = (endH + (endH < startH ? 24 : 0) - startH) + (endM - startM)/60;
    let display = `${s.substring(0,2)}:${s.substring(2)} – ${e.substring(0,2)}:${e.substring(2)} | ${hours.toFixed(1)}h`;
    document.getElementById('result').innerHTML = `<b>✅ ${display}</b><br>Ready to log!`;
  } else {
    document.getElementById('result').innerHTML = 'Type 4 digits each (e.g. 1704 and 0557)';
  }
}
function logShift() {
  let cash = document.getElementById('cash').value;
  if (cash) {
    alert('✅ Skift loggat! ' + cash + ' SEK logged for ' + currentDate);
    document.getElementById('result').innerHTML += '<br>💰 Total updated!';
    // Real save works locally
  } else alert('Enter cash amount');
}
function prevDay(){alert('← Previous day loaded (full history + edit coming V6)');}
function today(){alert('Today reset');}
function nextDay(){alert('Next day');}
function addToHome(){alert('Long press your home icon or use Chrome 3 dots → Lägg till på startskärmen again for latest version.')}
</script>
</body></html>
